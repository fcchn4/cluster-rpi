- name: RPI UPDATE OPERATING SYSTEM
  hosts: all
  become: True

  vars_files:
    - vars/os-user-connect.yml

  tasks:
    - name: Update Cache Packages
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade Packages
      ansible.builtin.apt:
        name: "*"
        state: latest

    - name: Execute Autoremove
      ansible.builtin.apt:
        autoremove: yes
